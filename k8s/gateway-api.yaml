apiVersion: v1
kind: Secret
metadata:
  name: gateway-api-secret
  namespace: ai-agent
type: Opaque
stringData:
  INTERNAL_MCP_TOKEN: dev-internal-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-api-config
  namespace: ai-agent
data:
  LOG_LEVEL: INFO
  API_PREFIX: /v1
  RAG_MCP_URL: http://rag-service:8001/mcp
  INTERNAL_MCP_ORIGIN: http://gateway-api.internal
  MCP_TIMEOUT_SECONDS: "30"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  namespace: ai-agent
spec:
  selector:
    app: gateway-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
  namespace: ai-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-api
  template:
    metadata:
      labels:
        app: gateway-api
    spec:
      containers:
        - name: gateway-api
          image: your-registry/gateway-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: gateway-api-config
                  key: LOG_LEVEL
            - name: API_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: gateway-api-config
                  key: API_PREFIX
            - name: RAG_MCP_URL
              valueFrom:
                configMapKeyRef:
                  name: gateway-api-config
                  key: RAG_MCP_URL
            - name: INTERNAL_MCP_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: gateway-api-config
                  key: INTERNAL_MCP_ORIGIN
            - name: MCP_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: gateway-api-config
                  key: MCP_TIMEOUT_SECONDS
            - name: INTERNAL_MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gateway-api-secret
                  key: INTERNAL_MCP_TOKEN
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 8
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"